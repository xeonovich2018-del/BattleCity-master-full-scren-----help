  <script type="text/javascript">
    $(function () {
      var FPS = 50;
      
      var CANVAS_ID = 'canvas';
      var ctx = createCanvasContext();
      ctx.font = "16px prstart"
      
      var eventManager = new EventManager();
      var keyboard = new Keyboard(eventManager);

      Controls.init();

      var sceneManager = new SceneManager(eventManager);
      sceneManager.toLoadingScene();
      
      setInterval(gameLoop, 1000 / FPS);
      
      function gameLoop() {
        keyboard.fireEvents();
        sceneManager.update();
        sceneManager.draw(ctx);
      }
      
      function createCanvasContext() {
        $('<canvas id="' + CANVAS_ID + '" width="' + Globals.CANVAS_WIDTH + '" height="' + Globals.CANVAS_HEIGHT + '"></canvas>').prependTo('#main');
        var canvas = document.getElementById(CANVAS_ID);
        return canvas.getContext('2d');
      };

      // ====================== УЛУЧШЕННЫЙ RESIZE (главный фикс смещения) ======================
      var canvas = document.getElementById(CANVAS_ID);

      window.resizeCanvas = function resizeCanvas() {
        // Сбрасываем все стили перед пересчётом
        canvas.style.position = '';
        canvas.style.left = '';
        canvas.style.top = '';
        canvas.style.transform = '';
        canvas.style.transformOrigin = '';
        canvas.style.width = '';
        canvas.style.height = '';

        // Принудительный reflow
        void canvas.offsetWidth;

        var scaleX = window.innerWidth / Globals.CANVAS_WIDTH;
        var scaleY = window.innerHeight / Globals.CANVAS_HEIGHT;
        var scale = Math.min(scaleX, scaleY, 4);

        var newWidth = Globals.CANVAS_WIDTH * scale;
        var newHeight = Globals.CANVAS_HEIGHT * scale;

        var offsetX = Math.floor((window.innerWidth - newWidth) / 2);
        var offsetY = Math.floor((window.innerHeight - newHeight) / 2);

        canvas.style.position = 'absolute';
        canvas.style.left = offsetX + 'px';
        canvas.style.top = offsetY + 'px';
        canvas.style.transformOrigin = 'top left';
        canvas.style.transform = 'scale(' + scale + ')';
        canvas.style.width = Globals.CANVAS_WIDTH + 'px';   // оригинальный размер
        canvas.style.height = Globals.CANVAS_HEIGHT + 'px';
      };

      // Многоразовый вызов resize при любых изменениях
      window.addEventListener('resize', window.resizeCanvas);
      window.addEventListener('load', window.resizeCanvas);
      
      // Дополнительные вызовы (на случай DOM-изменений от меню)
      setTimeout(window.resizeCanvas, 50);
      setTimeout(window.resizeCanvas, 300);
      setTimeout(window.resizeCanvas, 800);

      // Делаем #main стабильным контейнером
      document.getElementById('main').style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
      `;
    });
